model_kwargs:
  checkpoint: vitl.pt
  classifier_checkpoint: ssv2-vitl-16x2x3.pt
  module_name: evals.video_classification_frozen.modelcustom.vit_encoder_multiclip
  pretrain_kwargs:
    encoder:
      checkpoint_key: target_encoder
      img_temporal_dim_size: null
      model_name: vit_large
      patch_size: 16
      tubelet_size: 2
      uniform_power: true
      use_rope: true
  wrapper_kwargs:
    max_frames: 128
    use_pos_embed: false

# Experiment configuration for multi-classifier training
experiment:
  classifier:
    num_heads: 16
    num_probe_blocks: 1  # Classifier depth (1 = cross-attention only, >1 adds self-attention blocks)

  optimization:
    num_epochs: 5
    use_bfloat16: true
    
    # 20 classifier hyperparameter sets (5 LRs × 4 weight decays)
    # This allows hyperparameter search in a single training run
    multihead_kwargs:
      # Learning rate sweep with weight_decay=0.01
      - lr: 0.005
        start_lr: 0.005
        final_lr: 0.0
        weight_decay: 0.01
        final_weight_decay: 0.01
        warmup: 0.0
      - lr: 0.003
